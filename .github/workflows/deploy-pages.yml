name: Deploy to GitHub Pages

on:
  # Ejecuta el flujo cada vez que hay un push en la rama principal.
  push:
    branches:
      - main

# Permisos mínimos necesarios para publicar en GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Evita despliegues simultaneos sobre el mismo entorno.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Descarga el codigo del repositorio para el job.
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Configura Node.js para instalar dependencias y construir.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3) Instala dependencias: usa npm ci si hay lockfile, si no npm install.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      # 4) Construye el proyecto para generar la carpeta dist.
      - name: Build project
        run: npm run build

      # Configura GitHub Pages para recibir el artefacto estatico.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Empaqueta y sube la carpeta dist como artefacto de Pages.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Publica el artefacto subido en GitHub Pages.
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
